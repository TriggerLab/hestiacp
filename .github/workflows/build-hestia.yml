name: Build Hestia packages

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build? (true/false)'
        required: false
        default: 'false'
      deploy_target:
        description: 'Remote target path (if deploy=true)'
        required: false
        default: '/root/'

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Run npm build
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-build
          path: |
            build
            dist
            public
          if-no-files-found: warn

  build-deb:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure timezone on runner
        run: |
          sudo ln -snf /usr/share/zoneinfo/Europe/Amsterdam /etc/localtime || true
          echo CET | sudo tee /etc/timezone >/dev/null || true

      - name: Make autocompile script executable
        run: |
          if [ -f ./src/hst_autocompile.sh ]; then
            chmod +x ./src/hst_autocompile.sh
          else
            echo "Warning: ./src/hst_autocompile.sh not found"
          fi

      - name: Run hst_autocompile.sh inside debian:trixie container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/work \
            -w /work \
            -v /tmp:/tmp \
            debian:trixie \
            bash -lc 'ln -snf /usr/share/zoneinfo/Europe/Amsterdam /etc/localtime || true; echo CET > /etc/timezone || true; if [ -x ./src/hst_autocompile.sh ]; then ./src/hst_autocompile.sh --dontinstalldeps --hestia --debug --cross --noinstall --keepbuild "~localsrc"; else echo "Skipping autocompile: script missing or not executable"; fi'

      - name: Collect .deb files into ./hestia
        run: |
          mkdir -p ./hestia
          if compgen -G "/tmp/hestiacp-src/deb/*.deb" > /dev/null; then
            mv /tmp/hestiacp-src/deb/*.deb ./hestia/ || true
          else
            echo "No .deb files found in /tmp/hestiacp-src/deb/"
          fi
          ls -la ./hestia || true

      - name: Upload hestia .deb artifacts
        uses: actions/upload-artifact@v6
        with:
          name: hestia-debs
          path: hestia
          if-no-files-found: warn

  deploy:
    if: ${{ github.event.inputs.deploy == 'true' }}
    needs: build-deb
    runs-on: ubuntu-latest
    steps:
      - name: Download built DEBs
        uses: actions/download-artifact@v6
        with:
          name: hestia-debs
          path: ./hestia

      - name: Show files to upload
        run: ls -la ./hestia || true

      - name: Upload via SCP
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.apt_server }}
          username: root
          key: ${{ secrets.ssh_key }}
          port: 22
          source: "hestia/*"
          target: ${{ github.event.inputs.deploy_target }}
